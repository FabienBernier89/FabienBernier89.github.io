<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{font-family:'Montserrat',sans-serif;width:1200px;height:630px;position:relative;overflow:hidden;
       background:radial-gradient(120% 140% at 82% 8%, #2a5e48 0%, #1B3B31 42%, #0c2118 100%);color:#fff}
  /* halo / glow facon hero */
  .glow{position:absolute;width:760px;height:760px;right:-180px;top:-260px;border-radius:50%;
        background:radial-gradient(circle, rgba(56,160,110,.55) 0%, rgba(56,160,110,0) 62%);filter:blur(6px)}
  .grain{position:absolute;inset:0;
         background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px);background-size:100% 38px}
  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;
        padding:0 84px}
  .eyebrow{font-weight:700;font-size:21px;letter-spacing:.22em;text-transform:uppercase;color:#79e0ac;margin-bottom:26px}
  .wm{font-weight:800;font-size:128px;letter-spacing:-.03em;line-height:.96;color:#fff}
  .wm span{color:#5fd197}
  .tag{font-weight:600;font-size:36px;line-height:1.3;color:#dfeee7;margin-top:26px;max-width:880px}
  .rule{width:64px;height:5px;border-radius:3px;background:#38a06e;margin:34px 0 0}
  .foot{position:absolute;z-index:2;left:84px;right:84px;bottom:48px;display:flex;justify-content:space-between;
        align-items:center;font-size:24px;font-weight:600;color:#bfd8cd}
  .foot b{color:#fff;font-weight:700}
</style></head>
<body>
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="wrap">
    <div class="eyebrow">Traduction juridique par IA</div>
    <div class="wm">Lex<span>a</span></div>
    <div class="tag">Le traducteur qui parle votre langage juridique.</div>
    <div class="rule"></div>
  </div>
  <div class="foot"><span><b>lexamt.com</b></span><span>par Legal&nbsp;230, 1<sup>re</sup> agence européenne de traduction juridique</span></div>
</body></html>
